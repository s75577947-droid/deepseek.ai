<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>DeepSeek AI · Multi-Model</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-input: #1e1e2a;
            --accent: #6366f1;
            --accent-light: #818cf8;
            --user-bubble: #1e293b;
            --bot-bubble: #12121a;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --border: #1e293b;
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 12px;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin: 0;
            padding: 0;
            width: 100%;
        }

        .header {
            background: var(--bg-secondary);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            backdrop-filter: blur(20px);
            z-index: 10;
            flex-wrap: wrap;
            gap: 8px;
        }

        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 20px rgba(99,102,241,0.3);
            flex-shrink: 0;
        }
        .logo-text h2 { font-size: 18px; font-weight: 600; color: #f1f5f9; }
        .logo-text span { font-size: 11px; color: var(--text-secondary); }
        .header-actions { display: flex; gap: 8px; }
        .icon-btn {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg-input);
            color: #94a3b8;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .icon-btn:active { background: var(--accent); border-color: var(--accent); color: white; transform: scale(0.95); }

        .model-bar {
            display: flex;
            gap: 8px;
            padding: 10px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            flex-shrink: 0;
        }

        .model-chip {
            padding: 8px 18px;
            border-radius: 25px;
            border: 1px solid var(--border);
            background: var(--bg-input);
            color: var(--text-secondary);
            font-size: 13px;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .model-chip.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            box-shadow: 0 0 15px rgba(99,102,241,0.3);
        }

        .model-chip .chip-icon { font-size: 18px; }

        .mode-select-screen {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            padding: 20px;
        }
        .mode-select-screen.hidden { display: none; }
        .mode-select-screen h2 { font-size: 28px; margin-bottom: 8px; }
        .mode-select-screen p { color: var(--text-secondary); margin-bottom: 32px; text-align: center; }
        .mode-card {
            width: 100%;
            max-width: 360px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 28px 24px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            min-height: 120px;
        }
        .mode-card:active { border-color: var(--accent); box-shadow: 0 0 30px rgba(99,102,241,0.2); transform: scale(0.98); }
        .mode-card .mode-icon { font-size: 48px; margin-bottom: 12px; }
        .mode-card h3 { font-size: 22px; margin-bottom: 8px; }
        .mode-card p { font-size: 14px; color: var(--text-secondary); }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            -webkit-overflow-scrolling: touch;
        }
        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-track { background: transparent; }
        .chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .message { display: flex; gap: 10px; max-width: 88%; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.bot { align-self: flex-start; }
        .msg-avatar {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .user .msg-avatar { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; }
        .bot .msg-avatar { background: var(--bg-input); border: 1px solid var(--border); }
        .bubble {
            padding: 12px 16px;
            border-radius: 20px;
            line-height: 1.65;
            font-size: 15px;
            word-wrap: break-word;
        }
        .user .bubble { background: #1e293b; border-bottom-right-radius: 6px; color: #e2e8f0; }
        .bot .bubble { background: var(--bot-bubble); border: 1px solid var(--border); border-bottom-left-radius: 6px; color: #cbd5e1; }
        .bubble pre { background: #0a0a14; padding: 14px; border-radius: 12px; overflow-x: auto; margin: 8px 0; border: 1px solid var(--border); }
        .bubble code { font-family: 'JetBrains Mono', monospace; font-size: 13px; }

        .typing-bubble { display: flex; gap: 6px; padding: 14px 18px; }
        .typing-dot {
            width: 7px;
            height: 7px;
            background: var(--accent-light);
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
            30% { transform: translateY(-7px); opacity: 1; }
        }

        .input-area {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 12px 16px;
            padding-bottom: max(16px, env(safe-area-inset-bottom));
            display: flex;
            gap: 12px;
            align-items: flex-end;
            flex-shrink: 0;
            z-index: 10;
        }
        .input-box {
            flex: 1;
            background: var(--bg-input);
            border-radius: 28px;
            border: 1.5px solid var(--border);
            display: flex;
            align-items: center;
            transition: all 0.3s;
            padding: 4px 4px 4px 18px;
        }
        .input-box:focus-within { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(99,102,241,0.1); }
        .input-box input {
            flex: 1;
            border: none;
            background: transparent;
            color: var(--text-primary);
            font-size: 16px;
            padding: 14px 0;
            outline: none;
            font-family: inherit;
            line-height: 1.5;
            width: 100%;
            min-width: 0;
        }
        .input-box input::placeholder { color: #64748b; }
        .send-btn {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            border: none;
            background: var(--accent);
            color: white;
            font-size: 24px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(99,102,241,0.3);
        }
        .send-btn:active { transform: scale(0.92); background: #4f46e5; }
        .send-btn:disabled { opacity: 0.3; pointer-events: none; }
        
        .footer {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 12px 20px;
            text-align: center;
            color: #666;
            font-size: 11px;
            flex-shrink: 0;
            z-index: 5;
        }
    </style>
</head>
<body>

    <div class="mode-select-screen" id="modeSelectScreen">
        <h2>Choose Your Mode</h2>
        <p>This cannot be changed later</p>
        <div class="mode-card" data-mode="expert">
            <div class="mode-icon">🧠</div>
            <h3>Expert</h3>
            <p>Detailed, comprehensive answers with deep reasoning</p>
        </div>
        <div class="mode-card" data-mode="instant">
            <div class="mode-icon">⚡</div>
            <h3>Instant</h3>
            <p>Fast, concise answers for quick tasks</p>
        </div>
    </div>

    <div class="header">
        <div class="logo-area">
            <div class="logo-icon">🧠</div>
            <div class="logo-text">
                <h2>DeepSeek AI</h2>
                <span id="headerSubtitle">Multi-Model</span>
            </div>
        </div>
        <div class="header-actions">
            <button class="icon-btn" id="clearBtn">🗑️</button>
        </div>
    </div>

    <div class="model-bar" id="modelBar">
        <div class="model-chip active" data-model="deepseek">
            <span class="chip-icon">🧠</span> DeepSeek
        </div>
        <div class="model-chip" data-model="gemini">
            <span class="chip-icon">💎</span> Gemini
        </div>
        <div class="model-chip" data-model="chatgpt">
            <span class="chip-icon">🤖</span> ChatGPT
        </div>
        <div class="model-chip" data-model="claude">
            <span class="chip-icon">🎨</span> Claude
        </div>
    </div>

    <div class="chat-container" id="chatContainer"></div>

    <div class="input-area">
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Ask anything..." autocomplete="off" inputmode="text" enterkeyhint="send">
        </div>
        <button class="send-btn" id="sendBtn">▲</button>
    </div>
    
    <div class="footer">
        © 2026 Sepehr. All rights reserved. | Multi-Model AI
    </div>

    <script>
        // ===================== CONFIG =====================
        const API_KEY = 'sk-l6JvinlbAgq2ghGPd8HhginBj7ldpgTn3jPUPuxZxlleyNea';
        const BASE_URL = 'https://api.gapgpt.app/v1/chat/completions';
        const DAILY_LIMIT = 20;

        const MODEL_MAP = {
            deepseek: 'deepseek/deepseek-chat-v3-0324',
            gemini: 'gemini-2.5-flash',
            chatgpt: 'gpt-5.3-chat-latest',
            claude: 'claude-sonnet-5'
        };

        let conversationHistory = [];
        let selectedMode = null;
        let currentModel = 'deepseek';
        let isProcessing = false;

        // ===================== MODEL SELECTION =====================
        document.querySelectorAll('.model-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('.model-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentModel = chip.dataset.model;
            });
        });

        // ===================== MODE SELECTION =====================
        function selectMode(mode) {
            selectedMode = mode;
            localStorage.setItem('ds_mode', mode);
            document.getElementById('modeSelectScreen').classList.add('hidden');
            document.getElementById('headerSubtitle').textContent = mode === 'expert' ? 'Expert' : 'Instant';
            init();
            document.getElementById('userInput').focus();
        }

        document.querySelectorAll('.mode-card').forEach(card => {
            card.addEventListener('click', () => selectMode(card.dataset.mode));
        });

        // ===================== HELPERS =====================
        function getQuotaData() {
            const saved = localStorage.getItem('ds_quota');
            if (saved) try { return JSON.parse(saved); } catch(e) {}
            return { date: new Date().toDateString(), count: 0 };
        }
        function saveQuotaData(data) { localStorage.setItem('ds_quota', JSON.stringify(data)); }
        function checkQuota() {
            let quota = getQuotaData();
            const today = new Date().toDateString();
            if (quota.date !== today) { quota = { date: today, count: 0 }; saveQuotaData(quota); }
            return { exceeded: quota.count >= DAILY_LIMIT, remaining: DAILY_LIMIT - quota.count };
        }
        function incrementQuota() {
            let quota = getQuotaData();
            const today = new Date().toDateString();
            if (quota.date !== today) { quota = { date: today, count: 1 }; } else { quota.count++; }
            saveQuotaData(quota);
        }

        function init() {
            const saved = localStorage.getItem('ds_chat_v7');
            if (saved) try { conversationHistory = JSON.parse(saved); } catch(e) { conversationHistory = []; }
            if (!conversationHistory.length) {
                conversationHistory.push({
                    role: 'assistant',
                    content: '👋 Welcome to **DeepSeek AI**!\n\n🧠 Multi-Model Edition:\n• DeepSeek | 💎 Gemini | 🤖 ChatGPT | 🎨 Claude\n\nSelect your model above and ask anything!'
                });
                saveHistory();
            }
            renderChat();
            document.getElementById('userInput').focus();
        }

        function renderChat() {
            const container = document.getElementById('chatContainer');
            container.innerHTML = '';
            conversationHistory.forEach(msg => {
                if (msg.role === 'user' || msg.role === 'assistant') {
                    const div = document.createElement('div');
                    div.className = `message ${msg.role === 'user' ? 'user' : 'bot'}`;
                    div.innerHTML = `<div class="msg-avatar">${msg.role === 'user' ? '👤' : '🧠'}</div><div class="bubble">${formatText(msg.content)}</div>`;
                    container.appendChild(div);
                }
            });
            requestAnimationFrame(() => container.scrollTop = container.scrollHeight);
        }

        function formatText(t) {
            t = t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            t = t.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
            t = t.replace(/`(.*?)`/g, '<code>$1</code>');
            t = t.replace(/\n/g, '<br>');
            return t;
        }

        function saveHistory() { localStorage.setItem('ds_chat_v7', JSON.stringify(conversationHistory)); }

        async function callAPI(userMsg) {
            const messages = [
                { role: 'system', content: 'You are a helpful AI assistant.' },
                ...conversationHistory.slice(-16),
                { role: 'user', content: userMsg }
            ];
            const res = await fetch(BASE_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: MODEL_MAP[currentModel],
                    messages,
                    temperature: 0.7,
                    max_tokens: 2000
                })
            });
            if (!res.ok) throw new Error('API error');
            const data = await res.json();
            return data.choices[0].message.content;
        }

        async function sendMessage() {
            if (isProcessing || !selectedMode) return;
            const qc = checkQuota();
            if (qc.exceeded) {
                conversationHistory.push({ role: 'assistant', content: '⚠️ Daily limit reached. Come back tomorrow!' });
                renderChat(); saveHistory(); return;
            }
            const input = document.getElementById('userInput');
            const msg = input.value.trim();
            if (!msg) return;

            conversationHistory.push({ role: 'user', content: msg });
            input.value = '';
            renderChat(); saveHistory();
            showTyping();
            isProcessing = true;
            document.getElementById('sendBtn').disabled = true;

            try {
                const reply = await callAPI(msg);
                removeTyping();
                conversationHistory.push({ role: 'assistant', content: reply });
                renderChat(); saveHistory();
                incrementQuota();
            } catch(e) {
                removeTyping();
                conversationHistory.push({ role: 'assistant', content: '⚠️ Connection error. Please try again.' });
                renderChat(); saveHistory();
            } finally {
                isProcessing = false;
                document.getElementById('sendBtn').disabled = false;
                input.focus();
            }
        }

        function showTyping() {
            const c = document.getElementById('chatContainer');
            const d = document.createElement('div');
            d.className = 'message bot';
            d.id = 'typing';
            d.innerHTML = '<div class="msg-avatar">🧠</div><div class="bubble typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
            c.appendChild(d); c.scrollTop = c.scrollHeight;
        }
        function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

        function clearHistory() {
            if (confirm('Clear history?')) { conversationHistory = []; saveHistory(); init(); }
        }

        document.getElementById('clearBtn').addEventListener('click', clearHistory);
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('userInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });

        const savedMode = localStorage.getItem('ds_mode');
        if (!savedMode) {
            document.getElementById('modeSelectScreen').classList.remove('hidden');
        } else {
            selectMode(savedMode);
        }
        if (savedMode) { init(); }
    </script>
</body>
</html>
